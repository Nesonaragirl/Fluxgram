name: Build Fluxgram APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:          # lets you trigger a build manually from the GitHub UI

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1          # shallow clone — faster checkout

      # ── 2. Java ─────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── 3. NDK ──────────────────────────────────────────────────────────────
      # Telegram needs a specific NDK version for its JNI layers.
      # Pin to r21e (same ABI as the upstream project).
      - name: Install Android NDK r21e
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r21e
          add-to-path: true

      # ── 4. Gradle wrapper cache ──────────────────────────────────────────────
      # This is the single biggest time-saver: Gradle downloads ~600 MB of
      # tooling on the first run; the cache restores it in ~10 s on every
      # subsequent run.
      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-wrapper-

      # ── 5. Gradle dependency + build-output cache ────────────────────────────
      # Caches downloaded JARs/AARs and the incremental build outputs.
      # Key includes a hash of every build.gradle so the cache is busted
      # whenever a dependency changes.
      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            .gradle
          key: gradle-caches-${{ runner.os }}-${{ hashFiles('**/*.gradle', '**/*.gradle.kts', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-caches-${{ runner.os }}-

      # ── 6. NDK / ccache pre-built native libs cache ─────────────────────────
      # The native build (ffmpeg, libvpx, …) is the chunk that takes 30–40 min.
      # We cache the .so outputs keyed on the JNI source tree; if no C/C++
      # files changed the cache hits and the native step is skipped entirely.
      - name: Cache native build outputs (.so files)
        uses: actions/cache@v4
        with:
          path: |
            TMessagesProj/jni/build
            TMessagesProj/src/main/libs
            TMessagesProj/src/main/obj
          key: ndk-native-${{ runner.os }}-${{ hashFiles('TMessagesProj/jni/**') }}
          restore-keys: ndk-native-${{ runner.os }}-

      # ── 7. Stub secrets required by BuildVars ────────────────────────────────
      # A debug build only needs non-empty placeholder values so the Java code
      # compiles. Real values are only required for a production/release build.
      # Store your real keys in GitHub → Settings → Secrets → Actions and
      # replace the `echo` lines below with:
      #   APP_ID: ${{ secrets.TELEGRAM_APP_ID }}
      - name: Create BuildVars.java (debug stubs)
        run: |
          FILE="TMessagesProj/src/main/java/org/telegram/messenger/BuildVars.java"
          # Only overwrite if the file still contains the "fill me in" placeholder
          if grep -q "YOUR_APP_ID\|0; // fill\|APP_ID = 0" "$FILE" 2>/dev/null; then
            sed -i \
              -e 's/APP_ID\s*=\s*0/APP_ID = 4/' \
              -e 's/APP_HASH\s*=\s*""/APP_HASH = "placeholder"/' \
              "$FILE"
          fi

      # ── 8. Make gradlew executable ───────────────────────────────────────────
      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      # ── 9. Build ─────────────────────────────────────────────────────────────
      # assembleAfatDebug produces a single universal APK (all ABIs).
      # Use assembleArmv7Debug / assembleArm64Debug for smaller ABI-specific APKs.
      - name: Build debug APK
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          ./gradlew :TMessagesProj_App:assembleAfatDebug \
            --no-daemon \
            --parallel \
            --build-cache \
            --configuration-cache \
            -Dorg.gradle.jvmargs="-Xmx6g -XX:+UseParallelGC" \
            -Pandroid.useAndroidX=true

      # ── 10. Upload APK artifact ──────────────────────────────────────────────
      # After the workflow completes, go to Actions → your run → Artifacts
      # to download the APK directly — no Play Store or device needed.
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fluxgram-debug
          path: TMessagesProj_App/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 14
