name: Fast Build (arm64 test APK)

on:
  workflow_dispatch:

jobs:
  fast-build:
    name: arm64-only debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android NDK r21e
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r21e
          add-to-path: true

      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-wrapper-

      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            .gradle
          key: gradle-caches-${{ runner.os }}-${{ hashFiles('**/*.gradle', '**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-caches-${{ runner.os }}-

      - name: Cache arm64 native build outputs
        uses: actions/cache@v4
        with:
          path: |
            TMessagesProj/jni/build
            TMessagesProj/src/main/libs
            TMessagesProj/src/main/obj
          key: ndk-arm64-${{ runner.os }}-${{ hashFiles('TMessagesProj/jni/**') }}
          restore-keys: ndk-arm64-${{ runner.os }}-

      - name: Stub BuildVars (debug placeholders)
        run: |
          FILE="TMessagesProj/src/main/java/org/telegram/messenger/BuildVars.java"
          if grep -q "YOUR_APP_ID\|0; // fill\|APP_ID = 0" "$FILE" 2>/dev/null; then
            sed -i \
              -e 's/APP_ID\s*=\s*0/APP_ID = 4/' \
              -e 's/APP_HASH\s*=\s*""/APP_HASH = "placeholder"/' \
              "$FILE"
          fi

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build arm64 debug APK
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          ./gradlew :TMessagesProj_App:assembleAfatDebug \
            --no-daemon \
            --no-build-cache \
            -Dorg.gradle.jvmargs="-Xmx6g -XX:+UseParallelGC" \
            -Pandroid.useAndroidX=true \
            -Pandroid.injected.build.abi=arm64-v8a \
            2>&1 | tee /tmp/gradle-build.log
          # Print the last line that mentions .apk
          grep -i "\.apk" /tmp/gradle-build.log | tail -20 || true

      # Absolute brute-force search — scans the entire runner filesystem
      # so we can see exactly where Gradle wrote the APK regardless of path
      - name: Locate APK (full filesystem scan)
        if: always()
        run: |
          echo "=== Searching for *.apk everywhere ==="
          find /home/runner/work /tmp -name "*.apk" 2>/dev/null | sort || echo "(none found in work+tmp)"
          echo ""
          echo "=== TMessagesProj_App/build tree (apk-related) ==="
          find TMessagesProj_App/build -type f 2>/dev/null | grep -v "\.class\|\.dex\|\.jar\|intermediates" | sort || echo "(no TMessagesProj_App/build)"
          echo ""
          echo "=== build/outputs dirs anywhere ==="
          find /home/runner/work -type d -name "outputs" 2>/dev/null | sort

      - name: Copy APK to known upload location
        if: always()
        run: |
          mkdir -p /tmp/apk-upload
          # Try the expected path first
          EXPECTED="TMessagesProj_App/build/outputs/apk/afat/debug/app.apk"
          if [ -f "$EXPECTED" ]; then
            cp "$EXPECTED" /tmp/apk-upload/fluxgram-arm64-debug.apk
            echo "Found at expected path: $EXPECTED"
          else
            # Brute force: grab the first .apk found anywhere in the workspace
            FOUND=$(find /home/runner/work -name "*.apk" 2>/dev/null | head -1)
            if [ -n "$FOUND" ]; then
              cp "$FOUND" /tmp/apk-upload/fluxgram-arm64-debug.apk
              echo "Found at: $FOUND"
            else
              echo "NO APK FOUND ANYWHERE"
              exit 1
            fi
          fi
          ls -lh /tmp/apk-upload/

      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: fluxgram-arm64-debug
          path: /tmp/apk-upload/fluxgram-arm64-debug.apk
          if-no-files-found: error
          retention-days: 7
