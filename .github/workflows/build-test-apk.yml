name: Build Test APK

# Fast, unsigned-for-testing debug APK builds.
# Manual by default (Actions tab -> Build Test APK -> Run workflow),
# and also runs on pushes to any branch except master (compile.yml already
# handles fast compile checks there).

on:
  workflow_dispatch:
    inputs:
      abi:
        description: 'Which ABI to build for (fewer ABIs = faster build)'
        required: false
        default: 'arm64-v8a'
        type: choice
        options:
          - arm64-v8a
          - armeabi-v7a
          - x86_64
          - x86
          - all
  push:
    branches-ignore: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-apk-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-apk-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Determine ABI filter
        id: abi
        run: |
          ABI="${{ github.event.inputs.abi }}"
          if [ -z "$ABI" ] || [ "$ABI" = "all" ]; then
            echo "flag=" >> "$GITHUB_OUTPUT"
          else
            echo "flag=-Pandroid.injected.build.abi=$ABI" >> "$GITHUB_OUTPUT"
          fi

      - name: Assemble debug APK (afat flavor, testing only)
        run: >
          ./gradlew :TMessagesProj_App:assembleAfatDebug
          --parallel --build-cache
          -x lint -x test
          ${{ steps.abi.outputs.flag }}

      - name: Locate built APK(s)
        if: always()
        run: |
          echo "=== Searching the ENTIRE workspace for APKs (not just the expected path) ==="
          find . -iname "*.apk" -print 2>/dev/null || true

          echo
          echo "=== TMessagesProj_App/build/outputs tree ==="
          find TMessagesProj_App/build/outputs -maxdepth 6 2>/dev/null || echo "(directory does not exist)"

          echo
          echo "=== TMessagesProj_App/build/intermediates/apk tree (in case AGP left it here) ==="
          find TMessagesProj_App/build/intermediates/apk -maxdepth 6 2>/dev/null || echo "(directory does not exist)"

          echo
          echo "=== APK listing metadata (tells us the path AGP itself recorded) ==="
          find TMessagesProj_App/build -iname "output-metadata.json" -exec sh -c 'echo "--- {} ---"; cat "{}"' \; 2>/dev/null || true

          echo
          APK_COUNT=$(find . -iname "*.apk" 2>/dev/null | wc -l)
          echo "Found $APK_COUNT apk file(s) in the whole workspace."
          if [ "$APK_COUNT" -eq 0 ]; then
            echo "::error::No APK was produced anywhere in the workspace despite a successful Gradle build. See the directory listings and output-metadata.json above for AGP's actual output path."
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: test-apk
          path: |
            **/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload build logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            **/build/reports
          if-no-files-found: ignore
